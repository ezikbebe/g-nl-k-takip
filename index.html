<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOR — Günlük Takip</title>
<style>
:root {
  --bg:#0d0d0f; --surface:#16161a; --surface2:#1e1e24; --surface3:#26262e;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#f0f0f2; --muted:#8a8a9a;
  --pink:#e060a0; --pink2:#f080b8; --cyan:#40d0c0;
  --green:#40b870; --amber:#e0a030; --purple:#9060e0; --red:#e05060;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;}
.app{max-width:720px;margin:0 auto;padding:18px 12px 60px;}
.header{margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;}
.header h1{font-size:30px;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header .date{font-size:12px;color:var(--muted);margin-top:2px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-top:6px;flex-shrink:0;transition:background .3s;}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.synced{background:var(--green);}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);}
.tab{flex:1;padding:8px 4px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.tab.active{background:var(--surface3);color:var(--text);}
.panel{display:none;} .panel.active{display:block;}
.week-nav{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.week-nav::-webkit-scrollbar{height:0;}
.day-pill{display:flex;flex-direction:column;align-items:center;padding:7px 10px;border-radius:11px;border:1px solid var(--border);background:var(--surface);cursor:pointer;min-width:48px;transition:all .15s;flex-shrink:0;}
.day-pill:hover{border-color:var(--border2);}
.day-pill.active{background:var(--pink);border-color:transparent;}
.day-pill .dn{font-size:10px;font-weight:600;opacity:.7;}
.day-pill .dd{font-size:18px;font-weight:800;line-height:1.1;}
.day-pill .dl{font-size:9px;opacity:.6;margin-top:1px;}
.prog-wrap{background:var(--surface);border-radius:10px;padding:11px 13px;margin-bottom:14px;border:1px solid var(--border);}
.prog-top{display:flex;justify-content:space-between;margin-bottom:7px;font-size:12px;}
.prog-top span{color:var(--muted);} .prog-top strong{color:var(--cyan);}
.prog-bar{height:4px;background:var(--surface3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--cyan));border-radius:99px;transition:width .4s;}
.btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:var(--surface2);border-color:var(--pink);color:var(--pink);}
.btn.primary{background:var(--pink);border-color:transparent;color:#fff;}
.btn.primary:hover{background:var(--pink2);color:#fff;}
.toolbar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.timeline{display:flex;flex-direction:column;gap:7px;}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:border-color .15s;}
.task-card:hover{border-color:var(--border2);}
.task-card.done{opacity:.5;}
.task-card.done .task-title{text-decoration:line-through;}
.task-head{display:flex;align-items:flex-start;gap:9px;padding:11px 13px 9px;cursor:pointer;}
.task-time{font-size:11px;color:var(--muted);min-width:36px;margin-top:2px;}
.task-body{flex:1;}
.task-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.task-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);}
.tag.pink{background:rgba(224,96,160,.15);border-color:rgba(224,96,160,.3);color:var(--pink2);}
.tag.cyan{background:rgba(64,208,192,.12);border-color:rgba(64,208,192,.25);color:var(--cyan);}
.tag.green{background:rgba(64,184,112,.12);border-color:rgba(64,184,112,.25);color:var(--green);}
.tag.amber{background:rgba(224,160,48,.12);border-color:rgba(224,160,48,.25);color:var(--amber);}
.tag.purple{background:rgba(144,96,224,.12);border-color:rgba(144,96,224,.25);color:var(--purple);}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;}
.task-check:hover{border-color:var(--pink);}
.task-card.done .task-check{background:var(--green);border-color:var(--green);}
.task-check svg{display:none;} .task-card.done .task-check svg{display:block;}
.task-expand{max-height:0;overflow:hidden;transition:max-height .3s;}
.task-expand.open{max-height:500px;}
.task-detail{padding:10px 13px 13px;border-top:1px solid var(--border);}
.note-box{background:var(--surface2);border:1px solid var(--border);border-radius:7px;width:100%;min-height:56px;padding:7px 9px;color:var(--text);font-size:12px;font-family:inherit;resize:vertical;outline:none;margin-top:5px;}
.note-box:focus{border-color:var(--pink);}
.note-label{font-size:10px;color:var(--muted);}
.recur-badge{font-size:10px;color:var(--amber);margin-top:3px;}
.edit-row{display:flex;gap:5px;margin-top:8px;}
.mini-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface3);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;}
.mini-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.mini-btn.danger:hover{border-color:var(--red);color:var(--red);}
.section-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:18px 0 9px;padding-left:2px;}
.wd-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;margin-bottom:10px;overflow:hidden;}
.wd-card.today-wd{border-color:rgba(224,96,160,.45);}
.wd-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.wd-name{font-size:14px;font-weight:700;}
.wd-badges{display:flex;gap:5px;align-items:center;}
.wd-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(224,96,160,.15);color:var(--pink2);border:1px solid rgba(224,96,160,.3);}
.wd-expand{max-height:0;overflow:hidden;transition:max-height .4s;}
.wd-expand.open{max-height:3000px;}
.wd-body{padding:0 14px 14px;}
.ex-item{background:var(--surface2);border-radius:9px;padding:10px 12px;margin-bottom:7px;}
.ex-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.ex-name-el{font-size:13px;font-weight:600;flex:1;background:transparent;border:none;color:var(--text);font-family:inherit;outline:none;border-bottom:1px solid transparent;}
.ex-name-el:focus{border-bottom-color:var(--cyan);}
.ex-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 4px;}
.ex-del:hover{color:var(--red);}
.sets-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.set-chip{display:flex;align-items:center;gap:3px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:11px;}
.set-chip input{background:transparent;border:none;color:var(--text);font-size:11px;font-family:inherit;outline:none;width:68px;}
.set-chip-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;line-height:1;padding:0 1px;}
.set-chip-btn:hover{color:var(--cyan);}
.set-chip.logged{background:rgba(64,184,112,.15);border-color:rgba(64,184,112,.3);}
.set-chip.logged input{color:var(--green);}
.ex-note-el{font-size:11px;color:var(--muted);background:transparent;border:none;border-bottom:1px solid transparent;width:100%;font-family:inherit;outline:none;cursor:text;margin-top:4px;}
.ex-note-el:focus{border-bottom-color:var(--border2);color:var(--text);}
.ex-add-set{font-size:10px;padding:3px 8px;border-radius:5px;border:1px dashed var(--border2);background:transparent;color:var(--muted);cursor:pointer;margin-top:3px;}
.ex-add-set:hover{border-color:var(--cyan);color:var(--cyan);}
.add-ex-row{display:flex;gap:6px;margin-top:10px;}
.mini-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100%;}
.mini-input:focus{border-color:var(--cyan);}
.wd-days-row{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 10px;}
.wd-day-tag{padding:2px 8px;border-radius:20px;border:1px solid var(--border2);font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;background:transparent;transition:all .12s;user-select:none;}
.wd-day-tag.on{background:rgba(64,208,192,.15);border-color:rgba(64,208,192,.35);color:var(--cyan);}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 8px;}
.cal-nav:hover{color:var(--text);}
.cal-title{font-size:15px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cal-day-name{text-align:center;font-size:10px;font-weight:600;color:var(--muted);padding:4px 0;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:all .12s;background:var(--surface);}
.cal-cell:hover{border-color:var(--border2);}
.cal-cell.today{border-color:var(--pink);background:rgba(224,96,160,.1);}
.cal-cell.selected{background:var(--pink)!important;border-color:transparent!important;}
.cal-cell.selected .cal-num{color:#fff;}
.cal-cell.empty{background:transparent!important;border-color:transparent!important;cursor:default;}
.cal-num{font-size:12px;font-weight:600;}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:2px;}
.cal-cell.has-done .cal-dot{background:var(--green);}
.cal-cell.has-tasks:not(.has-done) .cal-dot{background:var(--border2);}
.month-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.mstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.mstat-val{font-size:22px;font-weight:800;line-height:1;}
.mstat-label{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.macro-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.macro-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 8px;text-align:center;}
.macro-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.macro-val{font-size:20px;font-weight:800;line-height:1;}
.macro-val.cal{color:var(--amber);} .macro-val.pro{color:var(--pink2);} .macro-val.carb{color:var(--cyan);} .macro-val.fat{color:var(--purple);}
.macro-target{font-size:9px;color:var(--muted);margin-top:2px;}
.macro-bar{height:3px;border-radius:99px;background:var(--surface3);margin-top:5px;overflow:hidden;}
.macro-bar-fill{height:100%;border-radius:99px;transition:width .3s;}
.water-wrap{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:14px;}
.water-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.water-top span{font-size:12px;color:var(--muted);}
.water-count{font-size:18px;font-weight:800;color:var(--cyan);}
.water-glasses{display:flex;gap:5px;flex-wrap:wrap;}
.glass{width:30px;height:30px;border-radius:7px;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s;}
.glass.filled{background:rgba(64,208,192,.2);border-color:var(--cyan);}
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:7px;}
.meal-head{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;}
.meal-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.meal-info{flex:1;}
.meal-name{font-size:13px;font-weight:600;}
.meal-macro{font-size:10px;color:var(--muted);margin-top:1px;}
.meal-kcal{font-size:12px;font-weight:700;color:var(--amber);}
.meal-body{max-height:0;overflow:hidden;transition:max-height .3s;}
.meal-body.open{max-height:800px;}
.meal-detail{padding:0 13px 11px;border-top:1px solid var(--border);padding-top:9px;}
.food-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.food-row:last-child{border-bottom:none;}
.food-name{flex:1;font-size:12px;}
.food-amount{font-size:11px;color:var(--muted);min-width:55px;text-align:right;}
.food-kcal{font-size:11px;color:var(--amber);min-width:45px;text-align:right;}
.food-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 3px;}
.food-del:hover{color:var(--red);}
.add-food-row{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:100;padding:14px;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:17px;padding:20px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--pink2);}
.modal label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;margin-top:11px;}
.modal input,.modal select,.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--pink);}
.modal select option{background:var(--surface);}
.modal-btns{display:flex;gap:7px;margin-top:14px;justify-content:flex-end;}
.day-checkboxes{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.day-cb{padding:4px 9px;border-radius:20px;border:1px solid var(--border2);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;background:transparent;transition:all .12s;user-select:none;}
.day-cb.on{background:rgba(64,208,192,.15);border-color:rgba(64,208,192,.35);color:var(--cyan);}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
.loading-screen h2{font-size:24px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.loading-screen p{font-size:13px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){
  .macro-cards{grid-template-columns:repeat(2,1fr);}
  .tabs .tab{font-size:10px;padding:7px 3px;}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <h2>SPOR</h2>
  <div class="spinner"></div>
  <p>Veriler yükleniyor...</p>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="header">
    <div>
      <h1>SPOR</h1>
      <div class="date" id="headerDate"></div>
    </div>
    <div class="sync-dot" id="syncDot" title="Senkronizasyon durumu"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('gunluk')">📋 Günlük</button>
    <button class="tab" onclick="switchTab('antrenman')">💪 Antrenman</button>
    <button class="tab" onclick="switchTab('beslenme')">🥗 Beslenme</button>
    <button class="tab" onclick="switchTab('aylik')">📅 Aylık</button>
  </div>

  <div class="panel active" id="panel-gunluk">
    <div class="week-nav" id="weekNav"></div>
    <div class="prog-wrap">
      <div class="prog-top"><span id="progLabel">Yükleniyor...</span><strong id="progPct">0%</strong></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="toolbar">
      <button class="btn primary" onclick="openAddTaskModal()">+ Görev Ekle</button>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="panel" id="panel-antrenman">
    <div class="toolbar">
      <button class="btn primary" onclick="openAddWorkoutModal()">+ Program Ekle</button>
    </div>
    <div id="workoutList"></div>
  </div>

  <div class="panel" id="panel-beslenme">
    <div class="section-head">Günlük Makro</div>
    <div class="macro-cards" id="macroCards"></div>
    <div class="water-wrap">
      <div class="water-top">
        <span>💧 Su tüketimi</span>
        <span class="water-count"><span id="waterCount">0</span> / <span id="waterTarget">8</span> bardak</span>
      </div>
      <div class="water-glasses" id="waterGlasses"></div>
    </div>
    <div class="section-head">Öğünler</div>
    <div id="mealList"></div>
    <div class="toolbar" style="margin-top:10px">
      <button class="btn primary" onclick="openAddMealModal()">+ Öğün Ekle</button>
      <button class="btn" onclick="openMacroTargetModal()">⚙ Hedefler</button>
    </div>
  </div>

  <div class="panel" id="panel-aylik">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <span class="cal-title" id="calTitle"></span>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="month-stats" id="monthStats"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxJQDg7wkPFb62UR2-MAdrZfpl7rxTBlY",
  authDomain: "spor-takip-5fa26.firebaseapp.com",
  projectId: "spor-takip-5fa26",
  storageBucket: "spor-takip-5fa26.firebasestorage.app",
  messagingSenderId: "110830641384",
  appId: "1:110830641384:web:f21896eb97e6f83bcbe95d",
  measurementId: "G-1XFCT5LS6G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC = doc(db, "spor", "main");

const DAYS_TR=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const DAYS_FULL=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const MONTHS_TR=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function todayStr(){const d=new Date();return fmtDate(d);}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseDateStr(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}

const defTasks=[];
const defWorkout=[];
const defMeals=[];

let S = {
  tasks: defTasks, selectedDate: todayStr(),
  workout: defWorkout, meals: defMeals,
  macroTargets:{kcal:3200,protein:220,carb:350,fat:90},
  water:{glasses:8,drunk:0}, mealExpanded:{},
  calMonth:new Date().getMonth(), calYear:new Date().getFullYear()
};

let _saving = false;
let _saveTimer = null;

function setSyncDot(state){
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + state;
}

async function saveToFirebase(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    setSyncDot('syncing');
    try {
      await setDoc(DOC, JSON.parse(JSON.stringify(S)));
      setSyncDot('synced');
    } catch(e){
      console.error(e);
      setSyncDot('error');
    }
  }, 800);
}

// Real-time listener
let _firstLoad = true;
onSnapshot(DOC, (snap)=>{
  if(snap.exists()){
    const data = snap.data();
    S = data;
    S.tasks.forEach(t=>{if(!t.doneByDate)t.doneByDate={};if(t.recurDays===undefined)t.recurDays=[0,1,2,3,4,5,6];});
    if(!S.mealExpanded) S.mealExpanded={};
    if(!S.water) S.water={glasses:8,drunk:0};
    if(S.calMonth===undefined){S.calMonth=new Date().getMonth();S.calYear=new Date().getFullYear();}
  }
  if(_firstLoad){
    _firstLoad = false;
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    renderAll();
  } else {
    renderAll();
  }
  setSyncDot('synced');
}, (err)=>{
  console.error(err);
  // offline — still show app with local data
  if(_firstLoad){
    _firstLoad = false;
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    renderAll();
  }
  setSyncDot('error');
});

function renderAll(){
  renderHeader(); renderWeek(); renderTimeline(); renderProgress();
  renderWorkout(); renderMacroCards(); renderWater(); renderMeals();
}

window.switchTab=function(id){
  const ids=['gunluk','antrenman','beslenme','aylik'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',ids[i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='aylik') renderCalendar();
}

function renderHeader(){
  const d=parseDateStr(S.selectedDate);
  document.getElementById('headerDate').textContent=`${d.getDate()} ${MONTHS_TR[d.getMonth()]} ${d.getFullYear()} — ${DAYS_FULL[d.getDay()]}`;
}

function getWeekDays(){const today=new Date();const arr=[];for(let i=-2;i<=4;i++){const d=new Date(today);d.setDate(today.getDate()+i);arr.push(d);}return arr;}

function renderWeek(){
  const nav=document.getElementById('weekNav');
  const today=todayStr();
  nav.innerHTML=getWeekDays().map(d=>{
    const ds=fmtDate(d);
    const active=ds===S.selectedDate?'active':'';
    const lbl=ds===today?'Bugün':'';
    return `<div class="day-pill ${active}" onclick="selectDay('${ds}')">
      <span class="dn">${DAYS_TR[d.getDay()]}</span>
      <span class="dd">${d.getDate()}</span>
      <span class="dl">${lbl}</span>
    </div>`;
  }).join('');
}

window.selectDay=function(ds){S.selectedDate=ds;saveToFirebase();renderWeek();renderHeader();renderTimeline();renderProgress();}

function getTasksForDate(ds){const d=parseDateStr(ds);const dayIdx=d.getDay();return S.tasks.filter(t=>t.recurDays.includes(dayIdx));}
function isTaskDone(task,ds){return!!task.doneByDate[ds];}

function renderProgress(){
  const tasks=getTasksForDate(S.selectedDate);
  const total=tasks.length,done=tasks.filter(t=>isTaskDone(t,S.selectedDate)).length;
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=`${done} / ${total} tamamlandı`;
}

function renderTimeline(){
  const el=document.getElementById('timeline');
  const ds=S.selectedDate;
  const tasks=getTasksForDate(ds).sort((a,b)=>a.time.localeCompare(b.time));
  if(!tasks.length){el.innerHTML=`<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px;">Bu gün için görev yok</div>`;return;}
  el.innerHTML=tasks.map(task=>{
    const done=isTaskDone(task,ds);
    const bc=task.highlight==='pink'?'rgba(224,96,160,.5)':task.highlight==='red'?'rgba(224,80,96,.5)':'';
    const bs=bc?`border-color:${bc};`:'';
    const tags=task.tags.map(t=>`<span class="tag ${t.color||''}">${t.label}</span>`).join('');
    const noteInd=task.note?' 📝':'';
    const recurLabel=task.recurDays.length===7?'Her gün':task.recurDays.length===5&&!task.recurDays.includes(0)&&!task.recurDays.includes(6)?'Hafta içi':task.recurDays.map(i=>DAYS_TR[i]).join(', ');
    return `<div class="task-card ${done?'done':''}" style="${bs}">
      <div class="task-head" onclick="toggleExpand(${task.id})">
        <div class="task-time">${task.time}</div>
        <div class="task-body">
          <div class="task-title">${task.title}${noteInd}</div>
          <div class="task-tags">${tags}</div>
          <div class="recur-badge">🔁 ${recurLabel}</div>
        </div>
        <div class="task-check" onclick="event.stopPropagation();toggleDone(${task.id})">
          <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
        </div>
      </div>
      <div class="task-expand" id="expand-${task.id}">
        <div class="task-detail">
          <div class="note-label">Not</div>
          <textarea class="note-box" rows="2" placeholder="Not ekle..." onchange="saveNote(${task.id},this.value)">${task.note||''}</textarea>
          <div class="edit-row">
            <button class="mini-btn" onclick="openEditTaskModal(${task.id})">Düzenle</button>
            <button class="mini-btn danger" onclick="deleteTask(${task.id})">Sil</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.toggleDone=function(id){const t=S.tasks.find(x=>x.id===id);if(!t)return;const ds=S.selectedDate;t.doneByDate[ds]=!t.doneByDate[ds];saveToFirebase();renderTimeline();renderProgress();}

window.saveTaskModal=function(){
  const time=document.getElementById('mTime').value;
  const title=document.getElementById('mTitle').value.trim();if(!title)return;
  const color=document.getElementById('mColor').value;
  const note=document.getElementById('mNote').value;
  const recurDays=[...document.querySelectorAll('#dayCbs .day-cb.on')].map(el=>+el.dataset.day);
  const tags=document.getElementById('mTags').value.split(',').map(s=>s.trim()).filter(Boolean).map(label=>({label,color}));
  if(_taskMode==='add'){
    S.tasks.push({id:Date.now(),time,title,tags,note,highlight:'',recurDays,doneByDate:{}});
  } else {
    const t=S.tasks.find(x=>x.id===_editTaskId);
    if(t){t.time=time;t.title=title;t.tags=tags;t.note=note;t.recurDays=recurDays;}
  }
  saveToFirebase();closeModal();renderTimeline();renderProgress();renderWeek();
}

function renderCalendar(){
  const yr=S.calYear,mo=S.calMonth;
  document.getElementById('calTitle').textContent=`${MONTHS_TR[mo]} ${yr}`;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const today=todayStr();
  let totalTasks=0,doneDays=0,totalDone=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayIdx=new Date(yr,mo,d).getDay();
    const tasks=S.tasks.filter(t=>t.recurDays.includes(dayIdx));
    const done=tasks.filter(t=>t.doneByDate[ds]).length;
    totalTasks+=tasks.length;totalDone+=done;
    if(tasks.length>0&&done===tasks.length)doneDays++;
  }
  document.getElementById('monthStats').innerHTML=`
    <div class="mstat"><div class="mstat-val" style="color:var(--cyan)">${doneDays}</div><div class="mstat-label">Tam gün</div></div>
    <div class="mstat"><div class="mstat-val" style="color:var(--green)">${totalDone}</div><div class="mstat-label">Görev yapıldı</div></div>
    <div class="mstat"><div class="mstat-val" style="color:var(--pink)">${totalTasks?Math.round((totalDone/totalTasks)*100):0}%</div><div class="mstat-label">Başarı oranı</div></div>`;
  let html=DAYS_TR.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayIdx=new Date(yr,mo,d).getDay();
    const tasks=S.tasks.filter(t=>t.recurDays.includes(dayIdx));
    const done=tasks.filter(t=>t.doneByDate[ds]).length;
    let cls='cal-cell';
    if(ds===today)cls+=' today';
    if(ds===S.selectedDate)cls+=' selected';
    if(done>0)cls+=' has-done';
    else if(tasks.length>0)cls+=' has-tasks';
    html+=`<div class="${cls}" onclick="calSelectDay('${ds}')"><span class="cal-num">${d}</span><span class="cal-dot"></span></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
window.changeMonth=function(dir){S.calMonth+=dir;if(S.calMonth>11){S.calMonth=0;S.calYear++;}if(S.calMonth<0){S.calMonth=11;S.calYear--;}saveToFirebase();renderCalendar();}

function calcMacros(){let kcal=0,protein=0,carb=0,fat=0;S.meals.forEach(m=>m.foods.forEach(f=>{kcal+=f.kcal||0;protein+=f.protein||0;carb+=f.carb||0;fat+=f.fat||0;}));return{kcal,protein,carb,fat};}
function renderMacroCards(){
  const m=calcMacros();const t=S.macroTargets;
  const cards=[{label:'Kalori',val:Math.round(m.kcal),target:t.kcal,cls:'cal',color:'#e0a030',unit:'kcal'},{label:'Protein',val:Math.round(m.protein),target:t.protein,cls:'pro',color:'#f080b8',unit:'g'},{label:'Karbonhidrat',val:Math.round(m.carb),target:t.carb,cls:'carb',color:'#40d0c0',unit:'g'},{label:'Yağ',val:Math.round(m.fat),target:t.fat,cls:'fat',color:'#9060e0',unit:'g'}];
  document.getElementById('macroCards').innerHTML=cards.map(c=>{const pct=Math.min(100,Math.round((c.val/c.target)*100));return `<div class="macro-card"><div class="macro-label">${c.label}</div><div class="macro-val ${c.cls}">${c.val}</div><div class="macro-target">${c.unit} / ${c.target} hedef</div><div class="macro-bar"><div class="macro-bar-fill" style="width:${pct}%;background:${c.color}"></div></div></div>`;}).join('');
}

window.deleteMeal=function(mealId){S.meals=S.meals.filter(m=>m.id!==mealId);saveToFirebase();renderMeals();renderMacroCards();}
window.openAddMealModal=function(){showModal(`<h3>Yeni Öğün</h3><label>Ad</label><input type="text" id="mnName" placeholder="Kahvaltı, Öğle..."><label>İkon (emoji)</label><input type="text" id="mnIcon" value="🍽️" maxlength="2"><label>Renk (hex)</label><input type="text" id="mnColor" value="#e0a030"><div class="modal-btns"><button class="mini-btn" onclick="closeModal()">İptal</button><button class="btn primary" onclick="saveMeal()">Ekle</button></div>`);}
window.saveMeal=function(){const name=document.getElementById('mnName').value.trim();if(!name)return;S.meals.push({id:Date.now(),name,icon:document.getElementById('mnIcon').value||'🍽️',color:document.getElementById('mnColor').value||'#e0a030',foods:[]});saveToFirebase();closeModal();renderMeals();renderMacroCards();}
window.openMacroTargetModal=function(){const t=S.macroTargets;showModal(`<h3>Makro Hedefleri</h3><label>Kalori (kcal)</label><input type="number" id="tKcal" value="${t.kcal}"><label>Protein (g)</label><input type="number" id="tPro" value="${t.protein}"><label>Karbonhidrat (g)</label><input type="number" id="tCarb" value="${t.carb}"><label>Yağ (g)</label><input type="number" id="tFat" value="${t.fat}"><label>Su (bardak)</label><input type="number" id="tWater" value="${S.water.glasses}"><div class="modal-btns"><button class="mini-btn" onclick="closeModal()">İptal</button><button class="btn primary" onclick="saveMacroTargets()">Kaydet</button></div>`);}
window.saveMacroTargets=function(){S.macroTargets={kcal:parseInt(document.getElementById('tKcal').value)||3200,protein:parseInt(document.getElementById('tPro').value)||220,carb:parseInt(document.getElementById('tCarb').value)||350,fat:parseInt(document.getElementById('tFat').value)||90};S.water.glasses=parseInt(document.getElementById('tWater').value)||8;saveToFirebase();closeModal();renderMacroCards();renderWater();}

window.showModal=function(html){document.getElementById('modalInner').innerHTML=html;document.getElementById('modal').style.display='flex';}
window.closeModal=function(){document.getElementById('modal').style.display='none';}
function showModal(html){window.showModal(html);}
function closeModal(){window.closeModal();}

</script>
</body>
</html>
